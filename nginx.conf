events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Trust X-Forwarded-For from Docker network and upstream proxies
    # This extracts the real client IP from the header chain
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Blog frontend
    server {
        listen 80;
        server_name boyunxi.cn localhost;

        # Proxy MinIO images
        location /images/ {
            proxy_pass http://minio:9000/blog-images/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Cache images for 1 year
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Blog app
        location / {
            proxy_pass http://blog:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
